---
trigger: none

parameters:
  - name: skip_what_if
    displayName: 'Skip What-If Stage'
    type: boolean
    default: false
%{ for script_file in script_files ~}
  - name: ${script_file.name}
    displayName: '${script_file.displayName}'
    type: boolean
    default: true
%{ endfor ~}

variables:
  PARAMETERS_FILE_NAME: 'parameters.json'

stages:
  - stage: WhatIf
    displayName: 'What If'
    condition: ne('$${{ parameters.skip_what_if }}', true)
    jobs:
      - deployment: whatif
        displayName: 'What If Deployment'
        pool:
          ${agent_pool_or_runner_configuration}
        environment: '${environment_name_plan}'
        timeoutInMinutes: 0
        strategy:
          runOnce:
            deploy:
              steps:
                - task: PowerShell@2
                  displayName: 'Show Parameters'
                  inputs:
                    targetType: 'inline'
                    pwsh: true
                    script: |
                      Write-Host "Parameters:"
                      Write-Host "skip_what_if: $${{ parameters.skip_what_if }}"
%{ for script_file in script_files ~}
                      Write-Host "${script_file.name}: $${{ parameters['${script_file.name}'] }}"
%{ endfor ~}

                - checkout: self
                  displayName: 'Checkout Bicep Module'

                - template: ./helpers/bicep-variables.yaml
                  parameters:
                    parametersFileName: $(PARAMETERS_FILE_NAME)

                - template: ./helpers/bicep-installer.yaml
                  parameters:
                    serviceConnection: '${service_connection_name_plan}'

                - template: ./helpers/bicep-first-deployment-check.yaml
                  parameters:
                    serviceConnection: '${service_connection_name_plan}'

%{ for script_file in script_files ~}
                - $${{ if eq(parameters['${script_file.name}'], true) }}:
                  - template: ./helpers/bicep-deploy.yaml
                    parameters:
                      name: '${script_file.name}'
                      displayName: '${script_file.displayName}'
                      serviceConnection: '${service_connection_name_plan}'
                      templateFilePath: '${script_file.templateFilePath}'
                      templateParametersFilePath: '${script_file.templateParametersFilePath}'
                      subscriptionId: '${script_file.subscriptionIdVariable}'
                      resourceGroupName: '${script_file.resourceGroupNameVariable}'
                      location: '$(LOCATION)'
                      deploymentType: '${script_file.deploymentType}'
                      firstRunWhatIf: ${script_file.firstRunWhatIf}
                      whatIfEnabled: true

%{ endfor ~}

  - stage: Deploy
    displayName: 'Deploy'
    dependsOn: WhatIf
    condition: and(not(failed()), not(canceled()))
    jobs:
      - deployment: deploy
        displayName: 'Deploy Bicep'
        pool:
          ${agent_pool_or_runner_configuration}
        environment: '${environment_name_apply}'
        timeoutInMinutes: 0
        strategy:
          runOnce:
            deploy:
              steps:
                - task: PowerShell@2
                  displayName: 'Show Parameters'
                  inputs:
                    targetType: 'inline'
                    pwsh: true
                    script: |
                      Write-Host "Parameters:"
                      Write-Host "skip_what_if: $${{ parameters.skip_what_if }}"
%{ for script_file in script_files ~}
                      Write-Host "${script_file.name}: $${{ parameters['${script_file.name}'] }}"
%{ endfor ~}

                - checkout: self
                  displayName: 'Checkout Bicep Module'

                - template: ./helpers/bicep-variables.yaml
                  parameters:
                    parametersFileName: $(PARAMETERS_FILE_NAME)

                - template: ./helpers/bicep-installer.yaml
                  parameters:
                    serviceConnection: '${service_connection_name_apply}'

                - template: ./helpers/bicep-first-deployment-check.yaml
                  parameters:
                    serviceConnection: '${service_connection_name_apply}'

%{ for script_file in script_files ~}
                - $${{ if eq(parameters['${script_file.name}'], true) }}:
                  - template: ./helpers/bicep-deploy.yaml
                    parameters:
                      name: '${script_file.name}'
                      displayName: '${script_file.displayName}'
                      serviceConnection: '${service_connection_name_apply}'
                      templateFilePath: '${script_file.templateFilePath}'
                      templateParametersFilePath: '${script_file.templateParametersFilePath}'
                      subscriptionId: '${script_file.subscriptionIdVariable}'
                      resourceGroupName: '${script_file.resourceGroupNameVariable}'
                      location: '$(LOCATION)'
                      deploymentType: '${script_file.deploymentType}'
                      firstRunWhatIf: ${script_file.firstRunWhatIf}
                      whatIfEnabled: false

%{ endfor ~}
